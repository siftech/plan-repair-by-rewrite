stages:
  - test

default:
  tags:
    - docker

variables:
  I_AGREE_TO_ALLEGRO_EXPRESS_LICENSE: "yes"
  GIT_SUBMODULE_STRATEGY: normal
  QUICKLISP_ADD_TO_INIT_FILE: true

test-plan-repair-by-rewrite:
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CLDI_EVENT == null'
    - if: '$CI_PIPELINE_SOURCE == "web"'

  parallel:
    matrix:
      - l: [sbcl, ccl, allegro11express]
        IMAGE_TAG: [latest]

  stage: test
  # The type of runner that the job will run on
  image:
    name: rpgoldman/$l:$IMAGE_TAG
    pull_policy: always # if-not-present -- always is the only policy our install supports

  script:
    - install-quicklisp

    - mkdir -p /asdf
    - cd /asdf
    - wget https://asdf.common-lisp.dev/archives/asdf.lisp

    - if [ $l = "sbcl" ]; then
        sbcl  --non-interactive --load /asdf/asdf.lisp --load "${CI_PROJECT_DIR}/do-test.lisp"  --eval "(uiop:quit 0)" ;
      fi
    - if [ $l = "allegro11express" ]; then
        alisp -L /asdf/asdf.lisp -L $CI_PROJECT_DIR/do-test.lisp --kill ;
      fi
    - if [ $l = "ccl" ]; then
        ccl --batch --load /asdf/asdf.lisp --load "${CI_PROJECT_DIR}/do-test.lisp" --eval "(uiop:quit 0)" ;
      fi
