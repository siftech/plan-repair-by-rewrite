name: test
stages:
  - test
tag: docker

variables:
  I_AGREE_TO_ALLEGRO_EXPRESS_LICENSE: "yes"
  GIT_SUBMODULE_STRATEGY: normal

test-plan-repair-by-rewrite:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CLDI_EVENT == null'
    - if: $CI_PIPELINE_SOURCE == "web"

  parallel:
    matrix:
      - l: [sbcl, ccl, allegro]
        IMAGE_TAG: latest

  stage: test
  # The type of runner that the job will run on
  image: image: containers.common-lisp.net/cl-docker-images/$l:$IMAGE_TAG

    # strategy:
    #   matrix:
    #     os: [ubuntu-latest]
    #     lisp:
    #       - sbcl
    #       - ccl
    #       - allegro
    #       # installation of quicklisp fails on Allegro for some reason. Have to fix this later.


  script:
    - install-quicklisp

    - mkdir /asdf && cd /asdf && wget https://asdf.common-lisp.dev/archives/asdf.lisp

    - if [ $l == "sbcl"]; then sbcl  --non-interactive --load /asdf/asdf.lisp --load $GITHUB_WORKSPACE/do-test.lisp --eval '(uiop:quit 0)' ; fi
    - if [ $l == "allegro"]; then alisp -L /asdf/asdf.lisp -L $GITHUB_WORKSPACE/do-test.lisp --kill ; fi
    - if [ $l == 'ccl' ]; then ccl --batch --load /asdf/asdf.lisp --load $GITHUB_WORKSPACE/do-test.lisp --eval '(uiop:quit 0)' ; fi
